artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Parse a small Apache-style access log and emit total request count, unique client count, and the most-requested path as JSON."
solution_explanation = "Stream the log line by line, tally total lines, collect distinct first-field IPs into a set, and count request paths pulled from the quoted request line with a regex to find the most common one."
verification_explanation = "The verifier independently recomputes total_requests, unique_ips, and top_path from /app/access.log and asserts each field of /app/report.json matches, so a stub or hard-coded file cannot pass."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []
